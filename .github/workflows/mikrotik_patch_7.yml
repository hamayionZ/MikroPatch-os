name: Auto-Patch RouterOS 7.x (Loader + ISO)
on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture (x86, arm64)'
        required: true
        default: 'x86'
        type: choice
        options: [x86, arm64]
      channel:
        description: 'Channel (stable, testing, long-term)'
        required: true
        default: 'stable'
      version:
        description: "Specific version (e.g., 7.22.1), empty for latest"
        required: false
        default: ''

permissions:
  contents: write

jobs:
  Patch_And_Build:
    runs-on: ubuntu-22.04
    env:
      # Keys for Scripts (GitHub Secrets se uthayi jayengi)
      CUSTOM_LICENSE_PRIVATE_KEY: ${{ secrets.CUSTOM_LICENSE_PRIVATE_KEY }}
      CUSTOM_LICENSE_PUBLIC_KEY: ${{ secrets.CUSTOM_LICENSE_PUBLIC_KEY }}
      CUSTOM_NPK_SIGN_PRIVATE_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PRIVATE_KEY }}
      CUSTOM_NPK_SIGN_PUBLIC_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PUBLIC_KEY }}
      CUSTOM_CLOUD_PUBLIC_KEY: ${{ secrets.CUSTOM_CLOUD_PUBLIC_KEY }}
      # Default MikroTik Keys (Agar secrets mein na hon toh crash na ho)
      MIKRO_LICENSE_PUBLIC_KEY: ${{ secrets.MIKRO_LICENSE_PUBLIC_KEY || '4a595133644d6736523959326e5535354d6d4a4d6b6e4d50516b32693836374a' }}
      MIKRO_NPK_SIGN_PUBLIC_KEY: ${{ secrets.MIKRO_NPK_SIGN_PUBLIC_KEY || 'c33b9347898862f18390885141e6b3531b402868c78c3c4343166443685e1327' }}
      MIKRO_CLOUD_PUBLIC_KEY: ${{ secrets.MIKRO_CLOUD_PUBLIC_KEY || '68c78c3c4343166443685e1327c33b9347898862f18390885141e6b3531b4028' }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y mkisofs xorriso squashfs-tools p7zip-full zip wget

    - name: Set Version and Architecture
      id: vars
      run: |
        if [ -z "${{ github.event.inputs.version }}" ]; then
          VERSION=$(wget -qO- https://download.mikrotik.com/routeros/NEWESTa7.${{ github.event.inputs.channel }} | cut -d ' ' -f1)
        else
          VERSION="${{ github.event.inputs.version }}"
        fi
        ARCH="${{ github.event.inputs.arch }}"
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "ARCH=$ARCH" >> $GITHUB_ENV
        
        # Arch suffix for download URLs
        if [ "$ARCH" == "arm64" ]; then echo "SUFFIX=-arm64" >> $GITHUB_ENV; else echo "SUFFIX=" >> $GITHUB_ENV; fi

    - name: Download MikroTik Files
      run: |
        # Download ISO
        wget -nv -O original.iso https://download.mikrotik.com/routeros/$VERSION/mikrotik-$VERSION$SUFFIX.iso
        # Download All Packages
        wget -nv -O packages.zip https://download.mikrotik.com/routeros/$VERSION/all_packages-$ARCH-$VERSION.zip
        mkdir -p ./pkgs_dir && unzip packages.zip -d ./pkgs_dir

    - name: Step 1 - Prepare Custom Tools (Option SFS)
      run: |
        mkdir -p ./opt_root/bin
        if [ "$ARCH" == "x86" ]; then
          cp ./busybox/busybox_x86 ./opt_root/bin/busybox
          cp ./keygen/keygen_x86 ./opt_root/bin/keygen
        else
          cp ./busybox/busybox_aarch64 ./opt_root/bin/busybox
          cp ./keygen/keygen_aarch64 ./opt_root/bin/keygen
        fi
        chmod +x ./opt_root/bin/*
        cd ./opt_root/bin/ && for c in $(./busybox --list); do ln -sf busybox $c; done && cd ../../
        sudo mksquashfs opt_root option.sfs -quiet -comp xz -no-xattrs -b 256k

    - name: Step 2 - Extract ISO and Create Loader (Patch Kernel)
      run: |
        mkdir -p ./iso_mount ./iso_files ./efi_mount
        sudo mount -o loop original.iso ./iso_mount
        sudo cp -rv ./iso_mount/* ./iso_files/
        sudo umount ./iso_mount
        sudo chown -R $USER:$USER ./iso_files

        # Patch Kernel in efiboot.img
        sudo mount -o loop ./iso_files/efiboot.img ./efi_mount
        if [ "$ARCH" == "x86" ]; then
          echo "Patching x86 Loader..."
          cp ./efi_mount/linux.x86_64 ./linux_patched
          sudo -E python3 patch.py kernel ./linux_patched
          # Replace in ISO (Legacy & EFI)
          cp ./linux_patched ./iso_files/isolinux/linux
          # Note: efiboot.img is read-only usually, so we patch the legacy boot file 
          # or rebuild efiboot.img if needed. For most VMs, isolinux/linux is enough.
        else
          echo "Patching ARM64 Loader..."
          cp ./efi_mount/EFI/BOOT/BOOTAA64.EFI ./boot_patched
          sudo -E python3 patch.py kernel ./boot_patched
        fi
        sudo umount ./efi_mount
        echo "Kernel Loader Patched."

    - name: Step 3 - Create and Sign Patched NPKs
      run: |
        # Use GPS package as a template to create 'option' package
        TEMPLATE=$(find ./pkgs_dir -name "gps-*.npk" | head -n 1)
        sudo -E python3 npk.py create "$TEMPLATE" ./pkgs_dir/option-$VERSION-$ARCH.npk option ./option.sfs -desc="Custom Patched Tools"
        
        # Patch RouterOS main package if needed
        MAIN_NPK="./pkgs_dir/routeros-$VERSION-$ARCH.npk"
        if [ -f "$MAIN_NPK" ]; then
          sudo -E python3 patch.py npk "$MAIN_NPK"
        fi

        # Sign ALL packages with Custom Key
        for f in ./pkgs_dir/*.npk; do
          echo "Signing $f..."
          sudo -E python3 npk.py sign "$f" "$f"
        done

    - name: Step 4 - Rebuild Final ISO
      run: |
        # Copy patched NPKs into ISO folder
        cp ./pkgs_dir/*.npk ./iso_files/
        
        # Create bootable ISO
        mkisofs -o mikrotik-patched-$VERSION-$ARCH.iso \
                -V "MikroTik $VERSION" \
                -b isolinux/isolinux.bin -c isolinux/boot.cat \
                -no-emul-boot -boot-load-size 4 -boot-info-table \
                -eltorito-alt-boot -e efiboot.img -no-emul-boot \
                -R -J ./iso_files

    - name: Step 5 - Upload Patched Files
      uses: actions/upload-artifact@v4
      with:
        name: Patched-RouterOS-$VERSION-$ARCH
        path: |
          mikrotik-patched-*.iso
          ./pkgs_dir/option-*.npk
          ./pkgs_dir/routeros-*.npk
