name: Final-Patch RouterOS 7.x (Loader + NPK)
on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture (x86, arm64)'
        required: true
        default: 'x86'
        type: choice
        options: [x86, arm64]
      channel:
        description: 'Channel (stable, testing)'
        required: true
        default: 'stable'

permissions:
  contents: write

jobs:
  Build_Patched_ISO:
    runs-on: ubuntu-22.04
    env:
      # --- IN KEYS KO APNE SECRETS MEIN LAZMI SET KAREIN ---
      CUSTOM_LICENSE_PUBLIC_KEY: ${{ secrets.CUSTOM_LICENSE_PUBLIC_KEY || '102030405060708090a0b0c0d0e0f0102030405060708090a0b0c0d0e0f01020' }}
      CUSTOM_LICENSE_PRIVATE_KEY: ${{ secrets.CUSTOM_LICENSE_PRIVATE_KEY || '0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20' }}
      CUSTOM_NPK_SIGN_PUBLIC_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PUBLIC_KEY || 'a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2' }}
      CUSTOM_NPK_SIGN_PRIVATE_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PRIVATE_KEY || '201f1e1d1c1b1a191817161514131211100f0e0d0c0b0a090807060504030201' }}
      
      MIKRO_LICENSE_PUBLIC_KEY: '4a595133644d6736523959326e5535354d6d4a4d6b6e4d50516b32693836374a'
      MIKRO_NPK_SIGN_PUBLIC_KEY: 'c33b9347898862f18390885141e6b3531b402868c78c3c4343166443685e1327'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Advanced Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y mkisofs xorriso squashfs-tools p7zip-full zip wget mtools

    - name: Prepare Version
      run: |
        V=$(wget -qO- https://download.mikrotik.com/routeros/NEWESTa7.${{ github.event.inputs.channel }} | cut -d ' ' -f1)
        echo "VERSION=$V" >> $GITHUB_ENV
        if [ "${{ github.event.inputs.arch }}" == "arm64" ]; then echo "SUFFIX=-arm64" >> $GITHUB_ENV; else echo "SUFFIX=" >> $GITHUB_ENV; fi

    - name: Download Files
      run: |
        wget -nv -O original.iso https://download.mikrotik.com/routeros/$VERSION/mikrotik-$VERSION$SUFFIX.iso
        wget -nv -O packages.zip https://download.mikrotik.com/routeros/$VERSION/all_packages-${{ github.event.inputs.arch }}-$VERSION.zip
        mkdir -p ./pkgs_dir && unzip packages.zip -d ./pkgs_dir

    - name: Create Option SFS
      run: |
        mkdir -p ./opt_root/bin
        if [ "${{ github.event.inputs.arch }}" == "x86" ]; then
          cp ./busybox/busybox_x86 ./opt_root/bin/busybox
          cp ./keygen/keygen_x86 ./opt_root/bin/keygen
        else
          cp ./busybox/busybox_aarch64 ./opt_root/bin/busybox
          cp ./keygen/keygen_aarch64 ./opt_root/bin/keygen
        fi
        chmod +x ./opt_root/bin/*
        cd ./opt_root/bin/ && for c in $(./busybox --list); do ln -sf busybox $c; done && cd ../../
        sudo mksquashfs opt_root option.sfs -quiet -comp xz -no-xattrs -b 256k

    - name: CREATE LOADER (UEFI + Legacy Fix)
      run: |
        mkdir -p ./iso_files ./efi_mount
        # 1. ISO content extract karein
        xorriso -osirrox on -indev original.iso -extract / ./iso_files
        sudo chmod -R 777 ./iso_files

        # 2. Extract Kernel from efiboot.img
        # Hum mtools use karenge efiboot.img ke andar se file nikalne ke liye
        if [ "${{ github.event.inputs.arch }}" == "x86" ]; then
          # Extract kernel for x86
          mcopy -i ./iso_files/efiboot.img ::linux.x86_64 ./linux_patched
          sudo -E python3 patch.py kernel ./linux_patched
          
          # Inject back into efiboot.img (UEFI Fix)
          mcopy -D o -i ./iso_files/efiboot.img ./linux_patched ::linux.x86_64
          
          # Replace Legacy Boot kernel
          cp ./linux_patched ./iso_files/isolinux/linux
        else
          # ARM64 logic
          mcopy -i ./iso_files/efiboot.img ::EFI/BOOT/BOOTAA64.EFI ./boot_patched
          sudo -E python3 patch.py kernel ./boot_patched
          mcopy -D o -i ./iso_files/efiboot.img ./boot_patched ::EFI/BOOT/BOOTAA64.EFI
        fi
        echo "Loader (Kernel) Patched for both UEFI and Legacy."

    - name: Sign & Patch NPKs
      run: |
        sudo chown -R $USER:$USER ./pkgs_dir
        # Template package (gps) use karein
        TEMPLATE=$(find ./pkgs_dir -name "gps-*.npk" | head -n 1)
        
        # 1. Option NPK create karein (Busybox tools)
        sudo -E python3 npk.py create "$TEMPLATE" ./pkgs_dir/option-$VERSION.npk option ./option.sfs -desc="Patched Tools"
        
        # 2. Main RouterOS NPK ko patch karein (Public key replacement)
        MAIN_NPK="./pkgs_dir/routeros-$VERSION-${{ github.event.inputs.arch }}.npk"
        if [ -f "$MAIN_NPK" ]; then
           sudo -E python3 patch.py npk "$MAIN_NPK"
        fi

        # 3. SARE packages ko apni CUSTOM key se sign karein
        # Agar ye step miss hua toh 'option' file enable nahi hogi
        for f in ./pkgs_dir/*.npk; do
          echo "Signing $f ..."
          sudo -E python3 npk.py sign "$f" "$f"
        done

    - name: Build Bootable ISO (UEFI Support)
      run: |
        # Patched NPKs copy karein
        cp ./pkgs_dir/*.npk ./iso_files/
        
        # Final ISO build with UEFI support attributes
        mkisofs -o mikrotik-patched-$VERSION.iso \
                -V "MikroTik $VERSION" \
                -b isolinux/isolinux.bin -c isolinux/boot.cat \
                -no-emul-boot -boot-load-size 4 -boot-info-table \
                -eltorito-alt-boot -e efiboot.img -no-emul-boot \
                -R -J ./iso_files

    - name: Upload Patched ISO
      uses: actions/upload-artifact@v4
      with:
        name: Patched-RouterOS-$VERSION
        path: mikrotik-patched-*.iso
